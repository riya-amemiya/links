name: Update Lockfile (One-time)
permissions:
  contents: write

on:
  push:
    branches:
      - riya-amemiya/fix-happy-dom-20.8.9

jobs:
  update-lockfile:
    runs-on: ubuntu-24.04-arm
    env:
      CI: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 # v0.14.0
        with:
          enable-cache: 'true'
      - name: Update lockfile
        run: bun install
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          if git diff --cached --quiet; then
            echo "No changes to bun.lock"
          else
            git commit -m "chore(deps): update bun.lock for happy-dom 20.8.9

          https://claude.ai/code/session_01T7t4ZsHtpvFyPSNik4PgNm"
            git push
          fi
      - name: Remove this workflow
        run: |
          git rm .github/workflows/update-lockfile-once.yml
          git commit -m "chore: remove one-time lockfile update workflow

          https://claude.ai/code/session_01T7t4ZsHtpvFyPSNik4PgNm"
          git push
